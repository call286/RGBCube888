name: Update Submodules

on:
  schedule:
    - cron: '0 0 * * *' # Runs at midnight UTC

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'true'
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update submodules
        run: |
          git submodule foreach 'git fetch origin main && git checkout origin/main'

      - name: Check for changes
        id: changes
        run: |
          if git diff-index --quiet HEAD --; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update submodules to latest main'
          title: 'chore: Update submodules to latest main branch'
          body: 'This PR updates all submodules to their latest commits from the main branch.\n\nGenerated by the Update Submodules workflow.'
          base: main
          branch: update-submodules
          delete-branch: true
